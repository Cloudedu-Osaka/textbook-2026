# Jupyter Book Configuration for textbook-2026
# 次年度（2026年度）授業向けテキストブック

title: 幾何学と計算思考 2026
author: Manabu Higashida
copyright: "2026"

# Book settings
execute:
  execute_notebooks: force
  allow_errors: true
  timeout: 300

# HTML-specific settings
html:
  home_page_in_navbar: true
  use_issues_button: true
  use_repository_button: true
  repository_url: https://github.com/moyhig-ecs/ggblab
  repository_branch: main

# LaTeX output
latex:
  latex_documents:
    targetname: textbook-2026.tex
  latex_engine: xelatex

# Sphinx configuration
sphinx:
  config:
    language: ja
    mathjax_path: https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
